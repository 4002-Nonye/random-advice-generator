<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="advice.css" />
    <script defer src="advice.js"></script>
    <title>Frontend Mentor | Advice generator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    
  </head>
  <body>
    <div>
    <div class="advice_container">
      <div>
        <p id="advice_id">Advice # <span class="id"></span></p>
      </div>
      <div><p class="advice">"Click on dice to get an advice"</p></div>
      <div><img src="images/pattern-divider-desktop.svg" alt="divider" /></div>
      <button class="dice_btn">
        <img src="images/icon-dice.svg" alt="dice" class="dice" />
      </button>
    </div>
</div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
